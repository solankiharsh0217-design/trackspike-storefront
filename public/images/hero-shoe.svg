<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" fill="none">
  <defs>
    <linearGradient id="shoe" x1="150" y1="300" x2="650" y2="550" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1c1917"/>
      <stop offset="0.3" stop-color="#292524"/>
      <stop offset="0.7" stop-color="#44403c"/>
      <stop offset="1" stop-color="#1c1917"/>
    </linearGradient>
    <linearGradient id="sole" x1="100" y1="520" x2="700" y2="580" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d4a520"/>
      <stop offset="0.5" stop-color="#e8c44a"/>
      <stop offset="1" stop-color="#b8941c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d4a520"/>
      <stop offset="1" stop-color="#f5e6a3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="30" stdDeviation="40" flood-color="#000" flood-opacity="0.2"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feFlood flood-color="#d4a520" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="800" fill="transparent"/>
  <!-- Glow -->
  <ellipse cx="400" cy="450" rx="250" ry="80" fill="#d4a520" opacity="0.08" filter="url(#glow)"/>
  <g filter="url(#shadow)" transform="translate(0, -30)">
    <!-- Shadow on ground -->
    <ellipse cx="400" cy="560" rx="220" ry="20" fill="#000" opacity="0.1"/>
    <!-- Sole -->
    <path d="M130 520 Q130 565 175 575 L625 575 Q670 565 670 520 L658 505 Q650 495 625 500 L175 500 Q150 495 142 505 Z" fill="url(#sole)"/>
    <!-- Sole tread pattern -->
    <rect x="190" y="558" width="35" height="10" rx="5" fill="#a16207" opacity="0.4"/>
    <rect x="250" y="558" width="35" height="10" rx="5" fill="#a16207" opacity="0.4"/>
    <rect x="310" y="558" width="35" height="10" rx="5" fill="#a16207" opacity="0.4"/>
    <rect x="370" y="558" width="35" height="10" rx="5" fill="#a16207" opacity="0.4"/>
    <rect x="430" y="558" width="35" height="10" rx="5" fill="#a16207" opacity="0.4"/>
    <rect x="490" y="558" width="35" height="10" rx="5" fill="#a16207" opacity="0.4"/>
    <rect x="550" y="558" width="35" height="10" rx="5" fill="#a16207" opacity="0.4"/>
    <!-- Midsole -->
    <path d="M142 505 Q150 485 175 478 L625 478 Q650 485 658 505 L625 500 L175 500 Z" fill="#f5f5f4" stroke="#e5e5e5" stroke-width="1"/>
    <!-- Air unit -->
    <ellipse cx="520" cy="490" rx="40" ry="12" fill="none" stroke="#d4a520" stroke-width="2" opacity="0.4"/>
    <!-- Shoe body -->
    <path d="M175 478 Q162 440 168 400 Q174 360 210 335 L360 275 Q410 260 460 268 Q510 275 550 310 Q590 345 600 385 Q610 425 605 478 Z" fill="url(#shoe)"/>
    <!-- Mesh texture -->
    <path d="M210 335 Q250 318 310 312 Q370 305 420 312 Q470 320 510 345" fill="none" stroke="#d4a520" stroke-width="1.5" opacity="0.3"/>
    <path d="M220 360 Q260 345 320 338 Q380 332 430 338 Q480 345 520 368" fill="none" stroke="#d4a520" stroke-width="1" opacity="0.2"/>
    <!-- Collar -->
    <path d="M550 310 Q575 295 595 308 Q615 320 608 345 Q600 360 588 352 Q578 344 568 332 Q560 320 550 310 Z" fill="#292524"/>
    <!-- Tongue -->
    <path d="M490 280 Q502 248 515 228 Q528 208 540 215 Q552 222 545 245 Q538 265 525 282" fill="#292524" stroke="#44403c" stroke-width="1"/>
    <!-- Tongue label -->
    <rect x="510" y="235" width="25" height="15" rx="3" fill="#d4a520"/>
    <text x="522" y="246" text-anchor="middle" fill="#1c1917" font-size="8" font-weight="bold" font-family="sans-serif">TS</text>
    <!-- Lace eyelets -->
    <circle cx="260" cy="365" r="5" fill="#44403c"/>
    <circle cx="300" cy="352" r="5" fill="#44403c"/>
    <circle cx="340" cy="342" r="5" fill="#44403c"/>
    <circle cx="380" cy="338" r="5" fill="#44403c"/>
    <circle cx="420" cy="338" r="5" fill="#44403c"/>
    <circle cx="460" cy="342" r="5" fill="#44403c"/>
    <!-- Laces -->
    <path d="M260 365 L300 352 M300 352 L340 342 M340 342 L380 338 M380 338 L420 338 M420 338 L460 342" fill="none" stroke="#d4a520" stroke-width="2" stroke-linecap="round"/>
    <!-- Swoosh -->
    <path d="M200 440 Q260 400 360 395 Q460 390 580 415" fill="none" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
    <!-- Heel counter -->
    <path d="M168 400 Q162 440 175 478 L200 478 Q188 440 192 400 Z" fill="#292524"/>
    <!-- Heel tab -->
    <rect x="160" y="388" width="40" height="32" rx="5" fill="#d4a520"/>
    <text x="180" y="409" text-anchor="middle" fill="#1c1917" font-size="12" font-weight="bold" font-family="sans-serif">TS</text>
    <!-- Pull tab -->
    <path d="M170 385 Q172 375 180 372 Q188 375 190 385" fill="none" stroke="#d4a520" stroke-width="2"/>
  </g>
</svg>
